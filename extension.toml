id = "autoit"
name = "AutoIt"
version = "0.1.0"
schema_version = 1
authors = ["Sumit Madan"]
description = "AutoIt v3 (.au3) language support for Zed"
repository = "https://github.com/sumit-m/zed-autoit"

# Snippets file matched by lowercase language id (autoit -> autoit.json).
# Paths are relative to this extension.toml.
snippets = ["./snippets/autoit.json"]

# Grammar is pulled from the sibling tree-sitter-autoit repo on GitHub.
# Pin to a specific commit SHA for reproducibility; bump when picking
# up grammar updates, then reinstall the dev extension in Zed.
[grammars.autoit]
repository = "https://github.com/sumit-m/tree-sitter-autoit"
commit = "f421a68daaffaa25d89b34c66d7b97bf49b9d845"

# LSP server: built from the sibling `autoit-lsp` repo. The extension's
# Rust code (src/lib.rs) tells Zed where to find the binary.
[language_servers.autoit-lsp]
name = "AutoIt LSP"
language = "AutoIt"
